
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ profile.name}} — Backend Developer</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
{% load static %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">
    
    <a href="/">{{ profile.name }}</a>
</div>
  <ul class="nav-links" id="navLinks">
    <li><a href="projects" onclick="closeMenu()">Projects</a></li>
    <li><a href="experience" onclick="closeMenu()">Experience</a></li>
    <li><a href="connect" onclick="closeMenu()">Connect</a></li>
  </ul>
  <button class="nav-menu-btn" id="menuBtn" onclick="toggleMenu()" aria-label="Menu">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
</button>
</nav>


{% block content %}
{% endblock %}

<!-- CONNECT -->
<div class="section-divider"></div>
<section class="section fade" id="connect">
  <div class="section-head">
    <span class="section-label">Connect</span>
    <div class="section-line"></div>
  </div>
  <div class="connect-box">
    <h2 class="connect-heading">{{ profile.connect_heading }}</h2>
    <p class="connect-sub">{{ profile.connect_text }}</p>
    <div class="connect-btns">
      <a href="mailto:{{ profile.email|default:'kinshukjangra869@gmail.com' }}" class="btn btn-primary">Send Email</a>
      <a href="{{ profile.github|default:'https://github.com/E-cyborg' }}" target="_blank" class="btn btn-glass">GitHub ↗</a>
      <a href="{{ profile.linkedin|default:'#' }}" target="_blank" class="btn btn-glass">LinkedIn ↗</a>
    </div>
  </div>
</section>
<footer>
  <span>{{ profile.name}} · {{ profile.email }} · Built with Django</span>
</footer>

<script>
  function toggleMenu() {
    document.getElementById('navLinks').classList.toggle('open');
  }
  function closeMenu() {
    document.getElementById('navLinks').classList.remove('open');
  }

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
  }, { threshold: 0.08 });

  document.querySelectorAll('.fade').forEach(el => observer.observe(el));

  document.addEventListener('click', (e) => {
    const nav = document.getElementById('navLinks');
    const btn = document.getElementById('menuBtn');
    if (!nav.contains(e.target) && !btn.contains(e.target)) {
      nav.classList.remove('open');
    }
  });
</script>

</body>
</html>
